<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Truck Type</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; margin: 0; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; position: relative; }
        .container { text-align: center; }
        .top-links { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .dashboard-link, .change-station-link { background: #3498db; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-size: 0.9em; }
        .dashboard-link:hover, .change-station-link:hover { background: #2980b9; }
        .change-station-link { background: #7f8c8d; }
        .change-station-link:hover { background: #95a5a6; }
        .truck-options { display: flex; gap: 20px; margin-top: 20px; }
        .truck-option { background: #34495e; padding: 20px; border-radius: 10px; cursor: pointer; transition: background 0.3s; }
        .truck-option:hover, .truck-option.selected { background: #3498db; }
        .truck-option img { max-width: 150px; border-radius: 5px; }
        .truck-option h3 { margin-top: 10px; }
        #serial-number-section { margin-top: 20px; display: none; }
        #serial-number-section input { font-size: 1.2em; padding: 10px; border-radius: 5px; border: none; }
        #serial-number-section button { font-size: 1.2em; padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="top-links">
        <a href="{% url 'station_picker_clear' %}" class="change-station-link">📍 Change station</a>
        <a href="{% url 'production_dashboard' %}" class="dashboard-link">📊 View Dashboard</a>
    </div>
    <div class="container">
        <h1>Select Truck Variant{% if station %} — {{ station.name }}{% endif %}</h1>
        <form method="POST" id="truck-form">
            {% csrf_token %}
            <div class="truck-options">
                {% for product in products %}
                <div class="truck-option" data-id="{{ product.id }}">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" alt="{{ product.name }}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div style="width: 150px; height: 100px; background-color: #4a6a8a; display: none; align-items: center; justify-content: center; border-radius: 5px; color: #fff;">Image Not Found</div>
                        <!-- Debug: {{ product.image.url }} -->
                    {% else %}
                        <div style="width: 150px; height: 100px; background-color: #4a6a8a; display: flex; align-items: center; justify-content: center; border-radius: 5px;">No Image</div>
                    {% endif %}
                    <h3>{{ product.name }}</h3>
                </div>
                {% endfor %}
            </div>
            <input type="hidden" name="product_id" id="product_id">
            <div id="serial-number-section">
                <h2>Enter Truck Serial Number</h2>
                <input type="text" name="truck_serial_number" placeholder="e.g., VIN123456" required>
                <button type="submit">Start Assembly</button>
            </div>
        </form>
    </div>

    <script>
        const options = document.querySelectorAll('.truck-option');
        const productIdInput = document.getElementById('product_id');
        const serialSection = document.getElementById('serial-number-section');

        options.forEach(option => {
            option.addEventListener('click', () => {
                // Clear previous selection
                options.forEach(opt => opt.classList.remove('selected'));
                // Set new selection
                option.classList.add('selected');
                productIdInput.value = option.dataset.id;
                serialSection.style.display = 'block';
            });
        });
    </script>
</body>
</html>
